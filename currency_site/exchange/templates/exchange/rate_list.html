{% extends "exchange/base.html" %} {% block content %}
<h2>Актуальні курси валют до гривні</h2>

<table>
  <thead>
    <tr>
      <th>Назва</th>
      <th>Курс купівлі</th>
      <th>Курс продажу</th>
    </tr>
  </thead>
  <tbody>
    {% for rate in rates %}
    <tr>
      <td>{{ rate.name }}</td>
      <td>{{ rate.buy_rate }}</td>
      <td>{{ rate.sell_rate }}</td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="3">Немає валют. Додайте їх через адмін-панель.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
