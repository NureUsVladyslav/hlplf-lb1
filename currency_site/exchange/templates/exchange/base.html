<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Курси валют</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f5f5f5;
      }
      h1 {
        color: #222;
      }
      nav {
        margin-bottom: 20px;
      }
      nav a,
      nav form button {
        display: inline-block;
        margin-right: 10px;
        padding: 10px 15px;
        text-decoration: none;
        border: none;
        background: #2d6cdf;
        color: white;
        border-radius: 6px;
        cursor: pointer;
      }
      nav a:hover,
      nav form button:hover {
        background: #1f4ea8;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 12px;
        text-align: center;
      }
      th {
        background: #e9eefb;
      }
      .admin-link {
        background: #28a745 !important;
      }
      .api-link {
        background: #6f42c1 !important;
      }
    </style>
  </head>
  <body>
    <h1>Сайт курсу валют</h1>

    <nav>
      <a href="{% url 'rate_list' %}">Актуальні курси</a>
      <a href="{% url 'today_rates' %}">Окрема вкладка поточного дня</a>

      <form
        action="{% url 'save_today_rates' %}"
        method="post"
        style="display: inline"
      >
        {% csrf_token %}
        <button type="submit">Зберегти результати поточного дня</button>
      </form>

      <a href="/admin/" class="admin-link">Адмін-панель</a>
      <a href="{% url 'today_rates_api' %}" class="api-link">API сьогодні</a>
    </nav>

    {% block content %}{% endblock %}
  </body>
</html>
